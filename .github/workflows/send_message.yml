name: Send Message to Telegram

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to Telegram'
        required: true

jobs:
  send-telegram-message:
    runs-on: ubuntu-latest

    steps:
    - name: Send message to Telegram
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="${{ github.event.inputs.message }}"

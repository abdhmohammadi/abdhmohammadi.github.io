name: Fetch and Deploy Secret Data

on:
  push:
    branches:
      - main  # Trigger the action on push to the main branch

jobs:
  fetch-secret-data:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install  # If you need to install any dependencies, like 'node-fetch'

    - name: Fetch secret data from GitHub API
      run: |
        const fetch = require('node-fetch');  // You need 'node-fetch' to make API requests
        const fs = require('fs');

        const token = process.env.SEND_MESSAGE_TO_TELEGRAM_TOKEN;  // Access GitHub Actions Secret
        const apiUrl = 'https://api.github.com/repos/abdhmohammadi/abdhmohammadi.github.io/contents/secret-data.json?ref=main';  // API URL to fetch secret data
        alert('test running');
        fetch(apiUrl, {
          headers: {
            'Authorization': `token ${token}`,
          }
        })
        .then(response => response.json())
        .then(data => {
          const decodedData = Buffer.from(data.content, 'base64').toString('utf8');  // Decode base64 data
          console.log('Decoded Secret Data:', decodedData);
          
          // Save the secret data to a file in your repository
          fs.writeFileSync('secret-data.json', decodedData);
        })
        .catch(error => console.error('Error fetching data:', error));
      env:
        GITHUB_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}  # Inject secret token into the environment

    - name: Commit and push the secret data file to GitHub
      run: |
        git add secret-data.json  # Add the new file to git
        git commit -m "Add secret data"  # Commit the changes
        git push origin main  # Push the changes to the main branch

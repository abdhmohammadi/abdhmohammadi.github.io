                currentState.userProgress = JSON.parse(savedProgress);

        function renderTOC() {
            tocList.innerHTML = '';
            
            bookData.chapters.forEach((chapter, chapterIndex) => {
                // Create chapter item
                const chapterItem = document.createElement('li');
                chapterItem.className = 'toc-item';
                
                const chapterLink = document.createElement('a');
                chapterLink.href = '#';
                chapterLink.className = 'toc-link';
                chapterLink.innerHTML = `${chapter.icon} ${chapter.title}`;
                chapterLink.onclick = (e) => {
                    e.preventDefault();
                    navigateToPage(chapterIndex, 0);
                    toggleTOC();
                };
                
                chapterItem.appendChild(chapterLink);
                
                // Create sub-pages if exist
                if (chapter.pages && chapter.pages.length > 0) {
                    const subList = document.createElement('ul');
                    subList.className = 'toc-sub-list';
                    
                    chapter.pages.forEach((page, pageIndex) => {
                        const subItem = document.createElement('li');
                        subItem.className = 'toc-sub-item';
                        
                        const subLink = document.createElement('a');
                        subLink.href = '#';
                        subLink.className = 'toc-sub-link';
                        subLink.textContent = page.title;
                        subLink.onclick = (e) => {
                            e.preventDefault();
                            navigateToPage(chapterIndex, pageIndex);
                            toggleTOC();
                        };
                        
                        subItem.appendChild(subLink);
                        subList.appendChild(subItem);
                    });
                    
                    chapterItem.appendChild(subList);
                }
                
                tocList.appendChild(chapterItem);
            });
        }

        function loadPage(chapterIndex, pageIndex) {
            const chapter = bookData.chapters[chapterIndex];
            const page = chapter.pages[pageIndex];
            
            // Update current state
            currentState.currentChapter = chapterIndex;
            currentState.currentPage = pageIndex;
            
            // Update UI
            currentChapterEl.textContent = chapter.title;
            currentPageEl.textContent = pageIndex + 1;
            totalPagesEl.textContent = chapter.pages.length;
            
            // Render page content based on type
            switch(page.type) {
                case 'exam-gallery':
                    renderExamGallery(page);
                    break;
            }
            
            // Update navigation buttons
            updateNavigation();
            
            // Update active TOC links
            updateActiveTOC();
            
            // Save progress
            saveProgress();

            contentHTML += `

                page.content.exams.forEach(exam => {

                `;

        function renderQuiz() {
            const quiz = bookData.quizzes[0];

                        <h3 class="quiz-title">${quiz.title}</h3>

                    </div>
                    <div class="quiz-actions" id="quizActions">

                        </button>
                        <button class="quiz-btn submit-btn" id="submitBtn" onclick="submitAnswer()">

                        </button>

                </div>
            `;
        }

        function initializeQuiz() {
            const quiz = bookData.quizzes[0];
            const quizQuestions = document.getElementById('quizQuestions');
            const currentQuestionIndex = currentState.quizAnswers.currentQuestion || 0;
            
            if (currentQuestionIndex < quiz.questions.length) {
                const question = quiz.questions[currentQuestionIndex];
                
                let optionsHTML = '';
                question.options.forEach((option, index) => {
                    optionsHTML += `
                        <div class="quiz-option" onclick="selectAnswer(${index})" id="option-${index}">
                            <div class="option-label">${String.fromCharCode(65 + index)}</div>
                            <span>${option}</span>
                        </div>
                    `;
                });
                
                quizQuestions.innerHTML = `
                    <div class="quiz-question">
                        ${currentQuestionIndex + 1}. ${question.question}
                    </div>
                    <div class="quiz-options">
                        ${optionsHTML}
                    </div>
                `;
                
                // Update progress
                updateQuizProgress();
                
                // Reset selected answer
                currentState.quizAnswers.selectedAnswer = null;
            } else {
                // Quiz completed
                showQuizResults();
            }
        }

        function selectAnswer(answerIndex) {
            // Remove selection from all options
            document.querySelectorAll('.quiz-option').forEach(option => {
                option.classList.remove('selected');
            });
            
            // Add selection to chosen option
            document.getElementById(`option-${answerIndex}`).classList.add('selected');
            
            // Store selected answer
            currentState.quizAnswers.selectedAnswer = answerIndex;
        }

        function submitAnswer() {
            const quiz = bookData.quizzes[0];
            const currentQuestionIndex = currentState.quizAnswers.currentQuestion || 0;
            const question = quiz.questions[currentQuestionIndex];
            const selectedAnswer = currentState.quizAnswers.selectedAnswer;
            
            if (selectedAnswer === null) {
                alert('لطفاً یک گزینه را انتخاب کنید');
                return;
            }
            
            // Show correct/incorrect feedback
            const options = document.querySelectorAll('.quiz-option');
            options.forEach((option, index) => {
                if (index === question.correctAnswer) {
                    option.classList.add('correct');
                } else if (index === selectedAnswer && index !== question.correctAnswer) {
                    option.classList.add('incorrect');
                }
                option.style.pointerEvents = 'none';
            });
            
            // Store result
            if (!currentState.quizAnswers.results) {
                currentState.quizAnswers.results = [];
            }
            currentState.quizAnswers.results.push({
                questionIndex: currentQuestionIndex,
                selectedAnswer: selectedAnswer,
                isCorrect: selectedAnswer === question.correctAnswer
            });
            
            // Update progress
            currentState.quizAnswers.currentQuestion = currentQuestionIndex + 1;
            
            // Change button to "Next"
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="fas fa-arrow-left"></i> سوال بعدی';
            submitBtn.className = 'quiz-btn next-btn';
            submitBtn.onclick = nextQuestion;

            saveProgress();
        }

        function showQuizResults() {
            const results = currentState.quizAnswers.results || [];
            const correctCount = results.filter(r => r.isCorrect).length;

            let icon = '🎉';
            
            if (percentage >= 80) {
                message = 'عالی! شما تسلط خوبی بر مفاهیم دارید.';
                icon = '🏆';

                message = 'خوب است! اما نیاز به مطالعه بیشتری دارید.';
                icon = '👍';
            } else {
                message = 'نیاز به مرور و مطالعه بیشتر دارید.';
                icon = '📚';
            }
            
            document.getElementById('quizQuestions').innerHTML = `
                <div style="text-align: center; padding: 40px 20px;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">${icon}</div>
                    <h3 style="color: #2c3e50; margin-bottom: 15px;">نتیجه آزمون</h3>

                    </div>
                    <p style="color: #666; margin-bottom: 25px;">${correctCount} از ${totalCount} سوال صحیح پاسخ داده‌اید.</p>
                    <p style="color: #444; font-weight: 500;">${message}</p>
                    <button class="quiz-btn submit-btn" onclick="restartQuiz()" style="margin-top: 30px;">
                        <i class="fas fa-redo"></i>
                        آزمون مجدد
                    </button>
                </div>
            `;
            
            document.getElementById('quizActions').style.display = 'none';
        }

        function restartQuiz() {
            currentState.quizAnswers = {
                currentQuestion: 0,
                results: [],
                selectedAnswer: null
            };
            initializeQuiz();
            
            // Reset button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ارسال پاسخ';
            submitBtn.className = 'quiz-btn submit-btn';
            submitBtn.onclick = submitAnswer;
            
            // Enable hint button
            document.getElementById('hintBtn').disabled = false;
            
            document.getElementById('quizActions').style.display = 'flex';
        }

        function updateQuizProgress() {
            const quiz = bookData.quizzes[0];
            const currentQuestionIndex = currentState.quizAnswers.currentQuestion || 0;
            const progress = (currentQuestionIndex / quiz.questions.length) * 100;
            
            document.getElementById('quizProgressFill').style.width = `${progress}%`;
            document.getElementById('quizProgressText').textContent = 
                `${currentQuestionIndex}/${quiz.questions.length}`;
        }

        function getChapterIcon(page) {
            const chapter = bookData.chapters[currentState.currentChapter];
            return chapter.icon;
        }

        function previewExam(imageUrl, title) {
            modalImage.src = imageUrl;
            modalTitle.textContent = title;
            modalOverlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function trackDownload(examId) {
            if (!currentState.userProgress.downloads) {
                currentState.userProgress.downloads = [];
            }
            
            if (!currentState.userProgress.downloads.includes(examId)) {
                currentState.userProgress.downloads.push(examId);
                saveProgress();
            }
            
            // Show download notification
            showNotification('دانلود شروع شد!');
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #10b981;
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 4000;
                font-family: Vazirmatn;
                animation: slideDown 0.3s ease;
            `;
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function updateNavigation() {
            const chapter = bookData.chapters[currentState.currentChapter];
            
            // Update prev button
            prevBtn.disabled = currentState.currentChapter === 0 && currentState.currentPage === 0;
            
            // Update next button
            const isLastPage = currentState.currentPage === chapter.pages.length - 1;
            const isLastChapter = currentState.currentChapter === bookData.chapters.length - 1;
            nextBtn.disabled = isLastPage && isLastChapter;
        }

        function updateActiveTOC() {
            // Update chapter links
            document.querySelectorAll('.toc-link').forEach((link, index) => {
                if (index === currentState.currentChapter) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
            
            // Update page links
            document.querySelectorAll('.toc-sub-link').forEach(link => {
                link.classList.remove('active');
            });
            
            // Activate current page if exists
            const currentPageLink = document.querySelectorAll('.toc-sub-link')[currentState.currentPage];
            if (currentPageLink) {
                currentPageLink.classList.add('active');
            }
        }

        function updateProgressDots() {
            progressDots.innerHTML = '';
            
            const chapter = bookData.chapters[currentState.currentChapter];
            
            for (let i = 0; i < chapter.pages.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i === currentState.currentPage) {
                    dot.classList.add('active');
                }
                dot.onclick = () => navigateToPage(currentState.currentChapter, i);
                progressDots.appendChild(dot);
            }
        }

        function navigateToPage(chapterIndex, pageIndex) {
            loadPage(chapterIndex, pageIndex);
            updateProgressDots();
        }

        function navigatePage(direction) {
            const chapter = bookData.chapters[currentState.currentChapter];
            let newChapter = currentState.currentChapter;
            let newPage = currentState.currentPage + direction;
            
            if (newPage < 0 && newChapter > 0) {
                // Go to last page of previous chapter
                newChapter--;
                const prevChapter = bookData.chapters[newChapter];
                newPage = prevChapter.pages.length - 1;
            } else if (newPage >= chapter.pages.length && newChapter < bookData.chapters.length - 1) {
                // Go to first page of next chapter
                newChapter++;
                newPage = 0;
            } else if (newPage < 0 || newPage >= chapter.pages.length) {
                // Invalid navigation
                return;
            }
            
            navigateToPage(newChapter, newPage);
        }

        function toggleTOC() {
            tocOverlay.style.display = tocOverlay.style.display === 'block' ? 'none' : 'block';
            document.body.style.overflow = tocOverlay.style.display === 'block' ? 'hidden' : 'auto';
        }

        function saveProgress() {
            localStorage.setItem('mathExamProgress', JSON.stringify(currentState.userProgress));
        }

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                if (tocOverlay.style.display === 'block') {
                    toggleTOC();
                }
            }
        });

        // Close modal when clicking outside
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        // Close TOC when clicking outside
        tocOverlay.addEventListener('click', (e) => {
            if (e.target === tocOverlay) {
                toggleTOC();
            }
        });

        // Add CSS animation for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

        // Generate a random integer within the range of the number of tracks on this page: 
        // This will cause one of the tracks to be selected each time the browser loads the page,

        function randomInt(min, max) 
        {
            return Math.floor(Math.random() * (max - min)) + min;

        function initializeBook()

        function renderTOC() 
        {
            tocList.innerHTML = '';
            
            DataTree.Tracks.forEach((track, trackIndex) => {
                // Create track item
                const trackItem = document.createElement('li');
                trackItem.className = 'toc-item';
                
                const trackLink = document.createElement('a');
                trackLink.href = '#';
                trackLink.className = 'toc-link';
                trackLink.innerHTML = `${track.icon} ${track.title}`;
                trackLink.onclick = (e) => {
                    e.preventDefault();
                    navigateToPage(trackIndex, 0);
                    toggleTOC();
                };
                
                trackItem.appendChild(trackLink);
                
                // Create sub-TextBooks if exist
                if (track.TextBooks && track.TextBooks.length > 0) 
                {
                    const subList = document.createElement('ul');
                    subList.className = 'toc-sub-list';
                    
                    track.TextBooks.forEach((page, bookIndex) => {
                        const subItem = document.createElement('li');
                        subItem.className = 'toc-sub-item';
                        
                        const subLink = document.createElement('a');
                        subLink.href = '#';
                        subLink.className = 'toc-sub-link';
                        subLink.textContent = page.title;
                        subLink.onclick = (e) => {
                            e.preventDefault();
                            navigateToPage(trackIndex, bookIndex);
                            toggleTOC();
                        };
                        
                        subItem.appendChild(subLink);
                        subList.appendChild(subItem);
                    });
                    
                    trackItem.appendChild(subList);
                }
                
                tocList.appendChild(trackItem);
            });
        }

            currentTrackEl.textContent = track.title;
            currentBookEl.textContent = bookIndex + 1;

            // Render book content based on type
            switch(book.type)

        function renderQuiz(quiz) 
        { 
            return `
                <div class="quiz-section" id="quizSection">
                    <div class="quiz-header">
                        <h3 class="quiz-title">${quiz.title}</h3>
                        <h4 style="color: red;">نسخه آزمایشی: بخش آزمون در حال توسعه است</h4>
                        <div class="quiz-progress">
                            <span>پیشرفت آزمون:</span>
                            <div class="progress-bar">
                                <div class="progress-fill" id="quizProgressFill"></div>
                            </div>
                            <span id="quizProgressText">0/2</span>
                        </div>
                    </div>
                    <div id="quizQuestions">
                        <!-- Quiz questions will be loaded here -->
                    </div>
                    <div class="quiz-actions" id="quizActions">
                        <button class="quiz-btn hint-btn" id="hintBtn" onclick="showHint()">
                            <i class="fas fa-lightbulb"></i>
                            راهنمایی
                        </button>
                        <button class="quiz-btn submit-btn" id="submitBtn" onclick="submitAnswer()">
                            <i class="fas fa-paper-plane"></i>
                            ارسال پاسخ
                        </button>
                    </div>
                </div>
            `;
        }
       
        function initializeQuiz(quiz) 
        {
            const quizQuestions = document.getElementById('quizQuestions');
            const currentQuestionIndex = currentState.quizAnswers.currentQuestion || 0;
            
            if (currentQuestionIndex < quiz.questions.length) 
            {
                const question = quiz.questions[currentQuestionIndex];
                
                let optionsHTML = '';
                question.options.forEach((option, index) => {
                    optionsHTML += `
                        <div class="quiz-option" onclick="selectAnswer(${index})" id="option-${index}">
                            <div class="option-label">${String.fromCharCode(65 + index)}</div>
                            <span>${option}</span>
                        </div>
                    `;
                });
                
                quizQuestions.innerHTML = `
                    <div class="quiz-question">
                        ${currentQuestionIndex + 1}. ${question.question}
                    </div>
                    <div class="quiz-options">
                        ${optionsHTML}
                    </div>
                `;
                
                // Update progress
                updateQuizProgress();
                
                // Reset selected answer
                currentState.quizAnswers.selectedAnswer = null;
                
                // Tell MathJax to render the new math content
                if (window.MathJax) 
                {
                    MathJax.typesetPromise([quizQuestions]).catch(err => console.error('MathJax typeset error:', err));
                }
            } else 
            {
                // Quiz completed
                showQuizResults();
            }
        }

        function selectAnswer(answerIndex) 
        {
            // Remove selection from all options
            document.querySelectorAll('.quiz-option').forEach(option => {
                option.classList.remove('selected');
            });
            
            // Add selection to chosen option
            document.getElementById(`option-${answerIndex}`).classList.add('selected');
            
            // Store selected answer
            currentState.quizAnswers.selectedAnswer = answerIndex;
        }

        function submitAnswer() 
        {
            const c = currentState.currentTrack;
            const p = currentState.currentBook;
            const quiz = DataTree.Tracks[c].TextBooks[p].content.quizzes[0];
            const currentQuestionIndex = currentState.quizAnswers.currentQuestion || 0;
            const question = quiz.questions[currentQuestionIndex];
            const selectedAnswer = currentState.quizAnswers.selectedAnswer;
            
            if (selectedAnswer === null) 
            {
                alert('لطفاً یک گزینه را انتخاب کنید');
                return;
            }
            
            // Show correct/incorrect feedback
            const options = document.querySelectorAll('.quiz-option');
            options.forEach((option, index) => {
                if (index === question.correctAnswer) {
                    option.classList.add('correct');
                } else if (index === selectedAnswer && index !== question.correctAnswer) {
                    option.classList.add('incorrect');
                }
                option.style.pointerEvents = 'none';
            });
            
            // Store result
            if (!currentState.quizAnswers.results) {
                currentState.quizAnswers.results = [];
            }
            currentState.quizAnswers.results.push({
                questionIndex: currentQuestionIndex,
                selectedAnswer: selectedAnswer,
                isCorrect: selectedAnswer === question.correctAnswer
            });
            
            // Update progress
            currentState.quizAnswers.currentQuestion = currentQuestionIndex + 1;
            
            // Change button to "Next"
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="fas fa-arrow-left"></i> سوال بعدی';
            submitBtn.className = 'quiz-btn next-btn';
            submitBtn.onclick = nextQuestion;
            
            // Disable hint button
            document.getElementById('hintBtn').disabled = true;
            
            saveProgress();
        }

        function showQuizResults() 
        {
            const results = currentState.quizAnswers.results || [];
            const correctCount = results.filter(r => r.isCorrect).length;
            const totalCount = results.length;
            const percentage = Math.round((correctCount / totalCount) * 100);
            
            let message = '';
            let icon = '🎉';
            
            if (percentage >= 80) 
            {
                message = 'عالی! شما تسلط خوبی بر مفاهیم دارید.';
                icon = '🏆';
            } else if (percentage >= 60) 
            {
                message = 'خوب است! اما نیاز به مطالعه بیشتری دارید.';
                icon = '👍';
            } else {
                message = 'نیاز به مرور و مطالعه بیشتر دارید.';
                icon = '📚';
            }
            
            document.getElementById('quizQuestions').innerHTML = `
                <div style="text-align: center; padding: 40px 20px;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">${icon}</div>
                    <h3 style="color: #2c3e50; margin-bottom: 15px;">نتیجه آزمون</h3>
                    <div style="font-size: 2.5rem; font-weight: bold; color: #667eea; margin-bottom: 20px;">
                        ${percentage}%
                    </div>
                    <p style="color: #666; margin-bottom: 25px;">${correctCount} از ${totalCount} سوال صحیح پاسخ داده‌اید.</p>
                    <p style="color: #444; font-weight: 500;">${message}</p>
                    <button class="quiz-btn submit-btn" onclick="restartQuiz()" style="margin-top: 30px;">
                        <i class="fas fa-redo"></i>
                        آزمون مجدد
                    </button>
                </div>
            `;
            
            document.getElementById('quizActions').style.display = 'none';
        }

        function restartQuiz() 
        {
            currentState.quizAnswers = {
                currentQuestion: 0,
                results: [],
                selectedAnswer: null
            };

            const c = currentState.currentTrack;
            const p = currentState.currentBook;
            const quiz = DataTree.Tracks[c].TextBooks[p].content.quizzes[0];
            initializeQuiz(quiz);
            
            // Reset button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ارسال پاسخ';
            submitBtn.className = 'quiz-btn submit-btn';
            submitBtn.onclick = submitAnswer;
            
            // Enable hint button
            document.getElementById('hintBtn').disabled = false;
            
            document.getElementById('quizActions').style.display = 'flex';
        }

        function updateQuizProgress() 
        {
            const c = currentState.currentTrack;
            const p = currentState.currentBook;
            const quiz = DataTree.Tracks[c].TextBooks[p].content.quizzes[0];
            
            const currentQuestionIndex = currentState.quizAnswers.currentQuestion || 0;
            const progress = (currentQuestionIndex / quiz.questions.length) * 100;
            
            document.getElementById('quizProgressFill').style.width = `${progress}%`;
            document.getElementById('quizProgressText').textContent = 
                `${currentQuestionIndex}/${quiz.questions.length}`;
        }

        function getChapterIcon(book) 
        {
            const track = DataTree.Tracks[currentState.currentTrack];
            return track.icon;
        }

        function previewExam(imageUrl, title) 
        {
            modalImage.src = imageUrl;
            modalTitle.textContent = title;
            modalOverlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() 
        {
            modalOverlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function handleDownload(examId, downloadUrl) 
        {
            // Check if button is disabled
            if (downloadUrl === '#' || downloadUrl === '') 
            {
                return; // Do nothing if disabled
            }
            
            // Track the download
            trackDownload(examId);
            
            // Open in new tab
            window.open(downloadUrl, '_blank');
        }
        
        async function trackDownload(examId) 
        {
            try {
                // Initialize downloads array if needed
                if (!currentState.userProgress.downloads) 
                {
                    currentState.userProgress.downloads = [];
                }
                
                // Track that download was initiated
                const downloadRecord = {
                    id: examId,
                    timestamp: new Date().toISOString(),
                    status: 'initiated'
                };
                
                // Add to tracking (allow multiple download attempts)
                currentState.userProgress.downloads.push(downloadRecord);
                
                // Save progress
                saveProgress();
                
                // Show notification
                showNotification('در حال آماده‌سازی دانلود...');
                
                // Optional: Send analytics to server
                if (typeof sendAnalytics === 'function') {
                    sendAnalytics('download_initiated', { examId });
                }
                
                // Optional: Track actual download success (if you have a way to know)
                return downloadRecord;
                
            } catch (error) 
            {
                console.error('Error tracking download:', error);
                showNotification('خطا در ثبت اطلاعات دانلود', 'error');
            }
        }

        function showNotification(message) 
        {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #10b981;
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 4000;
                font-family: Vazirmatn;
                animation: slideDown 0.3s ease;
            `;
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function updateNavigation() 
        {
            const track = DataTree.Tracks[currentState.currentTrack];
            
            // Update prev button
            prevBtn.disabled = currentState.currentTrack === 0 && currentState.currentBook === 0;
            
            // Update next button
            const isLastPage = currentState.currentBook === track.TextBooks.length - 1;
            const isLastChapter = currentState.currentTrack === DataTree.Tracks.length - 1;
            nextBtn.disabled = isLastPage && isLastChapter;
        }

        function updateActiveTOC() 
        {
            // Update track links
            document.querySelectorAll('.toc-link').forEach((link, index) => {
                if (index === currentState.currentTrack) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
            
            // Update book links
            document.querySelectorAll('.toc-sub-link').forEach(link => {
                link.classList.remove('active');
            });
            
            // Activate current book if exists
            const currentBookLink = document.querySelectorAll('.toc-sub-link')[currentState.currentBook];
            if (currentBookLink) {
                currentBookLink.classList.add('active');
            }
        }

        function updateProgressDots() 
        {
            progressDots.innerHTML = '';
            
            const track = DataTree.Tracks[currentState.currentTrack];
            
            for (let i = 0; i < track.TextBooks.length; i++) 
            {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i === currentState.currentBook) {
                    dot.classList.add('active');
                }
                dot.onclick = () => navigateToPage(currentState.currentTrack, i);
                progressDots.appendChild(dot);
            }
        }

        function navigateToPage(trackIndex, bookIndex) 
        {
            loadPage(trackIndex, bookIndex);
            updateProgressDots();
        }

        function navigatePage(direction) 
        {
            const track = DataTree.Tracks[currentState.currentTrack];
            let newChapter = currentState.currentTrack;
            let newPage = currentState.currentBook + direction;
            
            if (newPage < 0 && newChapter > 0) {
                // Go to last book of previous track
                newChapter--;
                const prevChapter = DataTree.Tracks[newChapter];
                newPage = prevChapter.TextBooks.length - 1;
            } else if (newPage >= track.TextBooks.length && newChapter < DataTree.Tracks.length - 1) {
                // Go to first book of next track
                newChapter++;
                newPage = 0;
            } else if (newPage < 0 || newPage >= track.TextBooks.length) {
                // Invalid navigation
                return;
            }
            
            navigateToPage(newChapter, newPage);
        }

        function toggleTOC() 
        {
            tocOverlay.style.display = tocOverlay.style.display === 'block' ? 'none' : 'block';
            document.body.style.overflow = tocOverlay.style.display === 'block' ? 'hidden' : 'auto';
        }

        function saveProgress() 
        {
            localStorage.setItem('mathExamProgress', JSON.stringify(currentState.userProgress));
        }

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                if (tocOverlay.style.display === 'block') {
                    toggleTOC();
                }
            }
        });

        // Close modal when clicking outside
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        // Close TOC when clicking outside
        tocOverlay.addEventListener('click', (e) => {
            if (e.target === tocOverlay) {
                toggleTOC();
            }
        });

        // Add CSS animation for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics Teacher - Blog</title>
    <link rel="stylesheet" href="../css/style.css"> <!-- Your existing CSS -->
    <style>
        /* Weblog-specific styles */
        .entry {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            overflow: hidden;
        }
        .sub-bar {
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }
        .comment-form {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- Your existing header/navigation -->
    <header>
        <nav>...</nav>
    </header>

    <main class="blog-container">
        <h1>My Teaching Blog</h1>
        <div id="blog-entries">
            <p>Loading blog posts...</p>
        </div>
    </main>

    <!-- Your existing footer -->
    <footer>...</footer>
    <!-- Add to your existing blog.html -->
<div id="comment-form" style="display:none;">
  <h3>Leave a Comment</h3>
  <input type="text" id="comment-name" placeholder="Your name">
  <textarea id="comment-text" placeholder="Your thoughts"></textarea>
  <button onclick="submitComment()">Submit</button>
</div>

<script>
// Configuration
const COMMENT_API = "https://script.google.com/macros/s/AKfycbyDUH9YU78MSin6Itg88aJhb6eZsf2AMatJCNVxuzdt8PE0-lL5TAggPGwUQO0fyxAV/exec"; // Paste web app URL here

// Show comment form for a post
function showCommentForm(postId) {
  document.getElementById('comment-form').style.display = 'block';
  document.getElementById('comment-form').dataset.postId = postId;
}

// Submit comment to Google Sheets
async function submitComment() {
  const name = document.getElementById('comment-name').value;
  const text = document.getElementById('comment-text').value;
  const postId = document.getElementById('comment-form').dataset.postId;
  
  await fetch(COMMENT_API, {
    method: 'POST',
    body: JSON.stringify({
      entryId: postId,
      name: name,
      text: text
    })
  });
  
  alert('Comment submitted!');
  location.reload(); // Refresh to show new comment
}
</script>
    <!-- Load blog script -->
    <script src="../js/blog.js"></script>
</body>
</html>
